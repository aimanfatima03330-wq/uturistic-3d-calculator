<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic 3D Neon Calculator</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for premium typography -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body class="neon-dark-theme">
    <!-- Background Particles Grid -->
    <div class="particles"></div>

    <!-- Loading Screen -->
    <div class="loader" id="loader">
        <div class="loader-glow"></div>
        <div class="loader-text">INITIALIZING QUANTUM MATRIX...</div>
    </div>

    <!-- Main App Container -->
    <main class="app-container">
        <!-- Header Controls -->
        <header class="app-header">
            <button id="theme-toggle" class="btn-util" aria-label="Toggle Theme">
                <span class="icon-sun">☀️</span>
                <span class="icon-moon">🌙</span>
            </button>
            <h1 class="app-title">NEO-CALC v3.0</h1>
            <button id="history-toggle" class="btn-util" aria-label="Toggle History">📜</button>
        </header>

        <div class="layout-wrapper">
            <!-- 3D Calculator Perspective Container -->
            <div class="calculator-perspective">
                <div class="calculator-card" id="calc-card">
                    <!-- Glassmorphic Screen Reflection -->
                    <div class="screen-reflection"></div>
                    
                    <!-- Display Screen -->
                    <div class="display-container">
                        <div class="display-glow"></div>
                        <div class="history-display" id="history-expr"></div>
                        <div class="main-display" id="main-expr">0</div>
                    </div>

                    <!-- Keypad Grid -->
                    <div class="keypad">
                        <!-- Row 1 -->
                        <button class="btn btn-action" data-action="clear">AC</button>
                        <button class="btn btn-action" data-action="delete">DEL</button>
                        <button class="btn btn-action" data-action="percent">%</button>
                        <button class="btn btn-operator" data-action="divide">÷</button>

                        <!-- Row 2 -->
                        <button class="btn btn-num" data-val="7">7</button>
                        <button class="btn btn-num" data-val="8">8</button>
                        <button class="btn btn-num" data-val="9">9</button>
                        <button class="btn btn-operator" data-action="multiply">×</button>

                        <!-- Row 3 -->
                        <button class="btn btn-num" data-val="4">4</button>
                        <button class="btn btn-num" data-val="5">5</button>
                        <button class="btn btn-num" data-val="6">6</button>
                        <button class="btn btn-operator" data-action="subtract">−</button>

                        <!-- Row 4 -->
                        <button class="btn btn-num" data-val="1">1</button>
                        <button class="btn btn-num" data-val="2">2</button>
                        <button class="btn btn-num" data-val="3">3</button>
                        <button class="btn btn-operator" data-action="add">+</button>

                        <!-- Row 5 -->
                        <button class="btn btn-num long-btn" data-val="0">0</button>
                        <button class="btn btn-num" data-val=".">.</button>
                        <button class="btn btn-equals" data-action="calculate">=</button>
                    </div>
                </div>
            </div>

            <!-- Modern Sidebar History Panel -->
            <aside class="history-panel" id="history-panel">
                <h3>Computation Log</h3>
                <div class="history-list" id="history-list">
                    <p class="empty-msg">Log is empty</p>
                </div>
                <button id="clear-history" class="btn-clear-log">Purge Log</button>
            </aside>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
